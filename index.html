<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0F0F11" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="A calm personal budgeting companion." />
  <title>Tally — your money, quietly noticed</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600&display=swap" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="app" class="app" data-view="home">

    <!-- Top header -->
    <header class="app-header">
      <div class="header-greeting">
        <p class="greeting-line" id="greeting-line">Good evening</p>
        <p class="greeting-sub" id="greeting-sub">Loading…</p>
      </div>
      <button class="streak-pill" id="streak-pill" type="button" aria-label="View streak">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3c1 4 4 5 4 9a4 4 0 0 1-8 0c0-2 1-3 2-4-1 3 2 4 2 1 0-2-1-4 0-6z"/>
        </svg>
        <span id="streak-count">0</span>
      </button>
    </header>

    <!-- Views container -->
    <main class="app-main">
      <section id="view-home" class="view view-home" aria-label="Home"></section>
      <section id="view-budget" class="view view-budget" hidden aria-label="Budget"></section>
      <section id="view-wishlist" class="view view-wishlist" hidden aria-label="Wishlist"></section>
      <section id="view-insights" class="view view-insights" hidden aria-label="Insights"></section>
      <section id="view-settings" class="view view-settings" hidden aria-label="Settings"></section>
    </main>

    <!-- Bottom navigation -->
    <nav class="app-nav" aria-label="Primary">
      <button class="nav-item is-active" data-view="home" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9.5h14V10"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-view="budget" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M16 12.5h2"/><path d="M3 9h14a2 2 0 0 1 2 2"/>
        </svg>
        <span>Budget</span>
      </button>
      <button class="nav-fab" id="open-add" type="button" aria-label="Add expense">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
      <button class="nav-item" data-view="wishlist" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 4h12v17l-6-4-6 4z"/>
        </svg>
        <span>Wishlist</span>
      </button>
      <button class="nav-item" data-view="settings" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/>
        </svg>
        <span>Settings</span>
      </button>
    </nav>

  </div>

  <!-- Modal mount -->
  <div id="modal-root" class="modal-root" aria-hidden="true"></div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file" accept="application/json" hidden />

  <script src="app.js"></script>
</body>
</html>
